const CANAIS = ["FILM & ARTS", "TCM BR", "ARTE 1 HD", "BIS HD", "CANAL BRASIL HD", "CURTA", "E!", "GNT HD", "MULTISHOW HD", "HGTV HD", "Modo Viagem", "TLC HD", "ANIMAL PLANET HD", "DISCOVERY HD", "DISCOVERY HOME&HEALTH HD", "DISCOVERY WORLD HD", "FUTURA HD", "CANAL UOL", "BAND HD", "CULTURA HD", "TV BRASIL", "GLOBO SP"];
const sel = new Set();
const openSet = new Set();   // canais expandidos
let curDay = null, period = "all", q = "";

const fmtTime = iso => { const d=new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
const dayKey = iso => new Date(iso).toLocaleDateString("sv-SE");
const dias = ["dom","seg","ter","qua","qui","sex","sáb"];
const dayLabel = key => { const d=new Date(key+"T12:00:00"); return dias[d.getDay()]+" "+String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0"); };
const durMin = p => Math.round((new Date(p.e)-new Date(p.s))/60000);

const allDays = [...new Set(PROGS.map(p=>dayKey(p.s)))].sort();
curDay = allDays[0];

function buildDays(){
  const c=document.getElementById("days"); c.innerHTML="";
  allDays.forEach(k=>{
    const b=document.createElement("button");
    b.className="day"+(k===curDay?" on":""); b.textContent=dayLabel(k);
    b.onclick=()=>{curDay=k; buildDays(); render();};
    c.appendChild(b);
  });
}

function inPeriod(p){
  if(period==="all") return true;
  const h=new Date(p.s).getHours();
  if(period==="tarde") return h>=12 && h<18;
  if(period==="noite") return h>=18 || h<2;
  return true;
}

function render(){
  const main=document.getElementById("main"); main.innerHTML="";
  const ql=q.toLowerCase();
  let any=false;
  CANAIS.forEach(ch=>{
    let items=PROGS.filter(p=>p.ch===ch && dayKey(p.s)===curDay && inPeriod(p));
    if(ql) items=items.filter(p=>(p.t+" "+(p.st||"")+" "+p.ch).toLowerCase().includes(ql));
    if(!items.length) return;
    any=true;
    const open = openSet.has(ch) || !!ql;   // busca abre os cards automaticamente
    const card=document.createElement("section");
    card.className="card"+(open?" open":"");

    const head=document.createElement("div"); head.className="card-head";
    head.innerHTML="<span class='card-name'>"+esc(ch.toLowerCase())+"</span>"+
      "<span class='card-meta'>"+items.length+" prog <span class='chev'>▾</span></span>";
    head.onclick=()=>{ if(openSet.has(ch))openSet.delete(ch); else openSet.add(ch); render(); };
    card.appendChild(head);

    const body=document.createElement("div"); body.className="card-body";
    items.forEach(p=>{
      const id=p.ch+"|"+p.s;
      const row=document.createElement("div");
      row.className="p"+(sel.has(id)?" sel":"");
      let tags="";
      if(p.ep)  tags+="<span class='tag'>"+esc(p.ep)+"</span>";
      if(p.cat) tags+="<span class='tag'>"+esc(p.cat)+"</span>";
      if(p.r)   tags+="<span class='tag tag-r'>class. "+esc(p.r)+"</span>";
      if(p.yr)  tags+="<span class='tag'>"+esc(p.yr)+"</span>";
      if(p.n>1) tags+="<span class='tag tag-n'>"+p.n+"x seguidas</span>";
      row.innerHTML=
        "<div class='p-time'>"+fmtTime(p.s)+"<span class='dur'>"+durMin(p)+"min</span></div>"+
        "<div class='p-main'>"+
          "<div class='p-ttl'>"+esc(p.t)+"</div>"+
          (p.st?"<div class='p-sub'>"+esc(p.st)+"</div>":"")+
          (tags?"<div class='p-tags'>"+tags+"</div>":"")+
          (p.d?"<div class='p-desc'>"+esc(p.d)+"</div>":"<div class='p-desc p-none'>sem sinopse</div>")+
        "</div>"+
        "<div class='mark' title='marcar para assistir'>✓</div>";
      row.querySelector(".mark").onclick=e=>{ e.stopPropagation();
        if(sel.has(id))sel.delete(id); else sel.add(id);
        row.classList.toggle("sel"); updateCart(); };
      body.appendChild(row);
    });
    card.appendChild(body);
    main.appendChild(card);
  });
  if(!any) main.innerHTML="<div class='empty'>nada nesse filtro. tenta outro dia ou período.</div>";
}

function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function updateCart(){
  document.getElementById("cn").textContent=sel.size;
  document.getElementById("cart").classList.toggle("show", sel.size>0);
}

function icsDate(iso){ return new Date(iso).toISOString().replace(/[-:]/g,"").split(".")[0]+"Z"; }

document.getElementById("search").oninput=e=>{q=e.target.value; render();};
document.getElementById("periods").onclick=e=>{
  if(!e.target.dataset.p) return;
  period=e.target.dataset.p;
  [...document.querySelectorAll(".per")].forEach(b=>b.classList.toggle("on",b===e.target));
  render();
};
function gcalUrl(p){
  const det=(p.st?p.st+" — ":"")+(p.d||"");
  return "https://calendar.google.com/calendar/render?action=TEMPLATE"
    +"&text="+encodeURIComponent(p.t+" ("+p.ch+")")
    +"&dates="+icsDate(p.s)+"/"+icsDate(p.e)
    +"&details="+encodeURIComponent(det)
    +"&location="+encodeURIComponent(p.ch);
}
function exportGCal(){
  const map=new Map(PROGS.map(p=>[p.ch+"|"+p.s,p]));
  const ids=[...sel]; if(!ids.length) return;
  if(ids.length>1 && !confirm("vai abrir "+ids.length+" abas do google agenda (uma por programa). seguir?")) return;
  ids.forEach(id=>{ const p=map.get(id); if(p) window.open(gcalUrl(p),"_blank"); });
}

document.getElementById("clear").onclick=()=>{sel.clear(); updateCart(); render();};
document.getElementById("gcal").onclick=exportGCal;

buildDays(); render();
</script>
</body>
</html>
